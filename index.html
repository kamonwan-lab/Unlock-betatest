<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unlock! ep2 - Game Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="welcome-screen">
        <h1>Unlock! Board Game</h1>
        <p>Select your episode to begin:</p>
        <div id="episode-list">
            </div>
    </div>

    <div id="game-screen" class="hidden">
        <div id="layout-container">
            <aside id="focus-panel">
                <header class="panel-header">
                    <button class="icon-btn" onclick="goHome()">🏠 Home</button>
                    <div class="search-container">
                        <input type="text" id="card-search" placeholder="Search card No...">
                        <button onclick="searchCard()">Find</button>
                    </div>
                </header>
                
                <section class="panel-section">
                    <div class="panel-title">FOCUS AREA</div>
                    <div id="focus-area" class="focus-viewer">
                        <img id="focus-img" src="" alt="FOCUSED" style="display:none;">
                        <p id="focus-placeholder">Select a card from played or waiting area</p>
                    </div>
                </section>

                <section class="panel-section">
                    <div class="panel-title">Used Cards</div>
                    <div id="trash-area" class="trash-zone drop-zone">
                        🗑️ USED [ Drag Here ]
                    </div>
                </section>
            </aside>

            <main id="game-area">
                <header class="panel-header">
                    <div class="header-main-title">GAME AREA</div>
                    <small>Wait... [Click to get and see back]</small>
                </header>

                <section id="game-grid">
                    </section>
            </main>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
